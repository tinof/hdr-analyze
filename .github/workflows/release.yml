name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create or Update Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: HDR-Analyze Suite ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## HDR-Analyze Suite ${{ github.ref_name }}
            
            This release includes **three tools** for HDR video analysis and processing:
            
            ### 🎬 Included Tools
            
            | Tool | Description |
            |------|-------------|
            | `hdr_analyzer_mvp` | HDR10/HLG frame analyzer and measurement generator |
            | `mkvdovi` | HDR10/HDR10+/HLG to Dolby Vision Profile 8.1 converter |
            | `verifier` | madVR measurement file verification utility |
            
            ### 📦 Download
            
            Choose the appropriate archive for your platform:
            
            | Platform | Archive |
            |----------|---------|
            | **Windows (x64)** | `hdr-analyze-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip` |
            | **macOS (Intel)** | `hdr-analyze-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` |
            | **macOS (Apple Silicon)** | `hdr-analyze-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |
            | **Linux (x64)** | `hdr-analyze-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz` |
            
            ### ⚡ One-Line Install
            
            **Linux/macOS:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash
            ```
            
            **Windows (PowerShell):**
            ```powershell
            irm https://github.com/${{ github.repository }}/releases/latest/download/install.ps1 | iex
            ```
            
            ### ⚙️ Prerequisites
            
            - **FFmpeg** must be installed and available in your system PATH
            - **mkvdovi** also requires `mkvmerge`, `dovi_tool` 2.3.2 or newer,
              and `hdr10plus_tool` when converting HDR10+ sources
            
            ### 🚀 Quick Start
            
            ```bash
            # HDR10 analysis
            ./hdr_analyzer_mvp -i input.mkv -o measurements.bin
            
            # Convert to Dolby Vision while preserving the source for A/B testing
            ./mkvdovi --keep-source --verify input.mkv
            
            # Verify binary files
            ./verifier --help
            ```
            
            ### 📝 What's New
            
            - **Breaking rename:** `mkvdolby` is now `mkvdovi`; this release includes a transitional
              `mkvdolby` alias and recognizes existing resume directories.
            - **Measured PQ max-RGB peaks:** direct PQ peaks now default to BT.2020 NCL max-RGB,
              validated against synthetic truth and Dolby's `cm_analyze`; use
              `--peak-domain luma` for the legacy Y-luma measurement.
            - **Resilient long conversions:** live byte progress, stall warnings, graceful
              interruption, and automatic resume from completed artifacts.
            - **Published validation and provenance:** reproducible accuracy tables and an explicit
              clean-room boundary for licensed-tool comparisons.

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for detailed changes.
            
            ### 🆘 Support
            
            - [Report Issues](https://github.com/${{ github.repository }}/issues)
            - [Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)

  upload-install-scripts:
    name: Upload Install Scripts
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload Install Scripts
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: |
            scripts/install.sh
            scripts/install.ps1

  build:
    name: Build (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install FFmpeg & Toolchain (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config clang lld libclang-dev \
            libavformat-dev libavcodec-dev libavutil-dev \
            libavfilter-dev libavdevice-dev libswscale-dev
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I/usr/include/$(gcc -dumpmachine)" >> $GITHUB_ENV

      - name: Install FFmpeg & Toolchain (macOS Intel)
        if: matrix.os == 'macos-15-intel'
        run: |
          brew install llvm ffmpeg pkg-config
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I$(brew --prefix)/include" >> $GITHUB_ENV

      - name: Install FFmpeg & Toolchain (macOS ARM)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm ffmpeg pkg-config
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I$(brew --prefix)/include" >> $GITHUB_ENV

      - name: Cache vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v5
        with:
          path: C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-ffmpeg-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-ffmpeg-

      - name: Install FFmpeg & Toolchain (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install -y llvm
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install ffmpeg:x64-windows
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PKG_CONFIG_PATH=$env:VCPKG_INSTALLATION_ROOT\\installed\\x64-windows\\lib\\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build All Binaries
        run: cargo build --verbose --release --workspace --target ${{ matrix.target }}

      - name: Build Archive (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Create staging directory
          staging="hdr-analyze-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging/bin"
          
          # Copy all binaries
          cp "target/${{ matrix.target }}/release/hdr_analyzer_mvp" "$staging/bin/"
          cp "target/${{ matrix.target }}/release/mkvdovi" "$staging/bin/"
          # Transitional alias after the v0.3.0 rename; remove in the next release.
          cp "target/${{ matrix.target }}/release/mkvdovi" "$staging/bin/mkvdolby"
          cp "target/${{ matrix.target }}/release/verifier" "$staging/bin/"
          cp scripts/mkvdovi_hifi_workflow.sh "$staging/bin/"
          
          # Copy documentation
          cp README.md "$staging/" 2>/dev/null || echo "README not found"
          cp CHANGELOG.md "$staging/" 2>/dev/null || echo "CHANGELOG not found"
          cp LICENSE "$staging/" 2>/dev/null || echo "LICENSE not found"
          
          # Create archive
          asset="hdr-analyze-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$asset" "$staging"
          echo "ASSET=$asset" >> $GITHUB_ENV

      - name: Build Archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Create staging directory
          staging="hdr-analyze-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging/bin"
          
          # Copy all binaries
          cp "target/${{ matrix.target }}/release/hdr_analyzer_mvp.exe" "$staging/bin/"
          cp "target/${{ matrix.target }}/release/mkvdovi.exe" "$staging/bin/"
          # Transitional alias after the v0.3.0 rename; remove in the next release.
          cp "target/${{ matrix.target }}/release/mkvdovi.exe" "$staging/bin/mkvdolby.exe"
          cp "target/${{ matrix.target }}/release/verifier.exe" "$staging/bin/"
          
          # Copy documentation
          cp README.md "$staging/" 2>/dev/null || echo "README not found"
          cp CHANGELOG.md "$staging/" 2>/dev/null || echo "CHANGELOG not found"
          cp LICENSE "$staging/" 2>/dev/null || echo "LICENSE not found"
          
          # Create archive
          asset="hdr-analyze-${{ github.ref_name }}-${{ matrix.target }}.zip"
          7z a "$asset" "$staging"
          echo "ASSET=$asset" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ASSET }}

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Cache
        uses: Swatinem/rust-cache@v2

      - name: Install FFmpeg dev libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config clang lld \
            libavformat-dev libavcodec-dev libavutil-dev \
            libavfilter-dev libavdevice-dev libswscale-dev

      - name: Run Tests
        run: cargo test --verbose --workspace

      - name: Run Clippy
        run: cargo clippy --workspace --release -- -D warnings

      - name: Check Formatting
        run: cargo fmt --all -- --check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run Security Audit
        run: cargo audit

  update-release-notes:
    name: Update Release Notes
    needs: [create-release, build, test, security-audit]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update Release with Build Status
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag_name = context.ref.replace('refs/tags/', '');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag_name
            });

            const updatedBody = release.body + `

            ---

            ### ✅ Build Status

            All builds completed successfully:
            - ✅ Cross-platform builds (Windows, macOS Intel, macOS ARM, Linux)
            - ✅ All three tools built: \`hdr_analyzer_mvp\`, \`mkvdovi\`, \`verifier\`
            - ✅ Test suite passed
            - ✅ Code quality checks (clippy, formatting)
            - ✅ Security audit passed

            ### 📋 Archive Contents

            Each archive contains:
            \`\`\`
            hdr-analyze-${tag_name}-<platform>/
            ├── bin/
            │   ├── hdr_analyzer_mvp
            │   ├── mkvdovi
            │   ├── verifier
            │   └── mkvdovi_hifi_workflow.sh (Linux/macOS)
            ├── README.md
            ├── CHANGELOG.md
            └── LICENSE
            \`\`\`

            ### 🔐 Verification

            After downloading, verify the binaries:
            \`\`\`bash
            ./bin/hdr_analyzer_mvp --help
            ./bin/mkvdovi --help
            ./bin/verifier --help
            \`\`\`
            `;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: updatedBody
            });

  notify-completion:
    name: Notify Release Completion
    needs: [create-release, build, test, security-audit, update-release-notes]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Release Status Summary
        run: |
          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tests** | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Security Audit** | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Included Tools" >> $GITHUB_STEP_SUMMARY
          echo "- \`hdr_analyzer_mvp\` - HDR10+ analyzer" >> $GITHUB_STEP_SUMMARY
          echo "- \`mkvdovi\` - Dolby Vision processor" >> $GITHUB_STEP_SUMMARY
          echo "- \`verifier\` - Binary verifier" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download**: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
