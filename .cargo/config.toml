# Use fast LLD linker on Linux ARM64 and optimize for the host CPU
[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "target-cpu=native"]

# Cross-compilation: generic x86-64 (no ARM-specific features)
[target.x86_64-unknown-linux-gnu]
rustflags = []
